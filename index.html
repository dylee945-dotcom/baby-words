<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>아기 단어 배우기</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Arial Rounded MT Bold',Arial,sans-serif; height:100vh; overflow:hidden; user-select:none; }
  .screen { display:none; width:100%; height:100vh; }
  .screen.active { display:flex; flex-direction:column; }

  /* HOME */
  #homeScreen {
    background:linear-gradient(160deg,#FFE0EC,#FFF3CC,#E0F4FF);
    align-items:center; justify-content:center; gap:24px; padding:30px 20px;
  }
  .home-title { font-size:60px; animation:bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; width:100%; max-width:380px; }
  .cat-btn {
    background:white; border:none; border-radius:22px; padding:16px 10px;
    font-weight:bold; color:#333; cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,0.1);
    display:flex; flex-direction:column; align-items:center; gap:5px;
    transition:transform .1s,box-shadow .1s;
  }
  .cat-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,0.1); }
  .cat-em { font-size:36px; }
  .cat-nm { font-size:14px; color:#666; }
  .home-btns { display:flex; gap:12px; }
  .icon-btn {
    background:white; border:none; border-radius:50%;
    width:56px; height:56px; font-size:24px; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,0.1); transition:transform .1s;
  }
  .icon-btn:active { transform:scale(0.9); }

  /* WORD SCREEN */
  #wordScreen { position:relative; overflow:hidden; }
  .word-bg { position:absolute; inset:0; z-index:0; transition:background 0.5s; }
  .deco { position:absolute; inset:0; z-index:1; overflow:hidden; pointer-events:none; }
  .deco-circle {
    position:absolute; border-radius:50%;
    background:rgba(255,255,255,0.15);
  }

  .emoji-wrap {
    position:absolute; inset:0; z-index:2;
    display:flex; align-items:center; justify-content:center;
  }
  .big-emoji {
    font-size:min(62vw,62vh); line-height:1;
    filter:drop-shadow(0 10px 30px rgba(0,0,0,0.15));
    animation:float 3s ease-in-out infinite;
    transition:opacity .2s;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
  .big-emoji.pop { animation:pop .35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1); animation-name:float;} }

  .back-btn {
    position:absolute; top:18px; left:18px; z-index:10;
    background:rgba(255,255,255,0.3); border:none; border-radius:50%;
    width:48px; height:48px; font-size:22px; cursor:pointer;
    backdrop-filter:blur(8px);
  }
  .progress-bar {
    position:absolute; top:0; left:0; height:5px;
    background:rgba(255,255,255,0.75); z-index:10; transition:width .3s;
  }
  .touch-overlay { position:absolute; inset:0; z-index:5; cursor:pointer; }

  .particles { position:absolute; inset:0; z-index:6; pointer-events:none; overflow:hidden; }
  .particle { position:absolute; font-size:30px; animation:pfloat 1s ease-out forwards; pointer-events:none; }
  @keyframes pfloat { 0%{transform:scale(0) translateY(0);opacity:1} 100%{transform:scale(1.5) translateY(-170px);opacity:0} }

  .praise-overlay {
    position:absolute; inset:0; z-index:8;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    background:rgba(0,0,0,0.2); backdrop-filter:blur(4px);
    opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .praise-overlay.show { opacity:1; pointer-events:auto; }
  .praise-em { font-size:110px; animation:ppop .5s cubic-bezier(0.36,.07,.19,.97); }
  @keyframes ppop { 0%{transform:scale(0) rotate(-10deg)} 60%{transform:scale(1.3) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }
  .praise-txt { font-size:32px; font-weight:bold; color:white; text-shadow:0 2px 8px rgba(0,0,0,0.3); }

  .sound-wave {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    border-radius:50%; background:rgba(255,255,255,0.2); z-index:4; pointer-events:none;
    animation:wexp .7s ease-out forwards;
  }
  @keyframes wexp { 0%{width:50px;height:50px;opacity:0.6} 100%{width:340px;height:340px;opacity:0} }

  .swipe-hint {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.6); font-size:14px; z-index:3;
    animation:fpulse 2.5s infinite; white-space:nowrap;
  }
  @keyframes fpulse { 0%,100%{opacity:0.25} 50%{opacity:0.9} }

  .slide-left  { animation:sil .25s ease; }
  .slide-right { animation:sir .25s ease; }
  @keyframes sil { from{opacity:0;transform:translateX(60%)} to{opacity:1;transform:translateX(0)} }
  @keyframes sir { from{opacity:0;transform:translateX(-60%)} to{opacity:1;transform:translateX(0)} }

  /* RECORD */
  #recordScreen {
    background:linear-gradient(160deg,#E8F4FF,#F0E8FF);
    align-items:center; padding:55px 16px 20px; gap:16px; overflow-y:auto;
  }
  .rec-title { font-size:24px; color:#6B48FF; font-weight:bold; }
  .rec-list { width:100%; max-width:420px; display:flex; flex-direction:column; gap:10px; }
  .rec-item {
    background:white; border-radius:16px; padding:12px 16px;
    display:flex; align-items:center; gap:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.07);
  }
  .ri-em { font-size:30px; }
  .ri-info { flex:1; }
  .ri-name { font-size:19px; font-weight:bold; color:#333; }
  .ri-status { font-size:12px; color:#999; margin-top:2px; }
  .ri-btns { display:flex; gap:6px; }
  .sm-btn {
    border:none; border-radius:50%; width:42px; height:42px;
    font-size:18px; cursor:pointer; box-shadow:0 3px 0 rgba(0,0,0,0.1); transition:transform .1s;
  }
  .sm-btn:active { transform:scale(0.9); }
  .btn-play { background:#6BCB77; }
  .btn-rec  { background:#FF6B9D; }
  .btn-redo { background:#FF9A3C; }
  .back-home {
    background:white; border:none; border-radius:16px;
    padding:12px 28px; font-size:16px; font-weight:bold;
    color:#6B48FF; cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,0.1);
  }

  /* ADD */
  #addScreen {
    background:linear-gradient(160deg,#FFF0E8,#E8FFE8);
    align-items:center; padding:55px 16px 30px; gap:14px; overflow-y:auto;
  }
  .add-title { font-size:24px; font-weight:bold; color:#FF6B00; }
  .add-form { width:100%; max-width:420px; display:flex; flex-direction:column; gap:12px; }
  .add-input {
    background:white; border:3px solid #FFD93D; border-radius:14px;
    padding:14px 16px; font-size:20px; font-family:inherit; outline:none; width:100%;
  }
  .add-input:focus { border-color:#FF9A3C; }
  .photo-preview {
    width:100%; height:140px; background:white; border:3px dashed #ccc;
    border-radius:18px; display:flex; align-items:center; justify-content:center;
    font-size:36px; cursor:pointer; overflow:hidden; flex-direction:column; gap:6px;
  }
  .photo-preview img { width:100%; height:100%; object-fit:cover; }
  .big-btn {
    background:linear-gradient(135deg,#FF9A3C,#FF6B9D); border:none;
    border-radius:16px; padding:14px; font-size:18px; font-weight:bold;
    color:white; cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,0.15); transition:transform .1s;
  }
  .big-btn:active { transform:translateY(3px); }
  .big-btn.green  { background:linear-gradient(135deg,#6BCB77,#4DA6FF); }
  .big-btn.redbtn { background:linear-gradient(135deg,#FF4444,#FF9A3C); }
  .rec-ind {
    display:none; align-items:center; gap:8px; background:#FFE0E0;
    border-radius:12px; padding:10px 14px; font-size:15px; color:#FF4444; font-weight:bold;
  }
  .rec-ind.on { display:flex; }
  .recdot { width:11px; height:11px; background:#FF4444; border-radius:50%; animation:blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }
</style>
</head>
<body>

<!-- HOME -->
<div id="homeScreen" class="screen active">
  <div class="home-title">🌈</div>
  <div class="grid">
    <button class="cat-btn" onclick="startCat('food')"    style="border-bottom:6px solid #FF6B9D"><span class="cat-em">🍎</span><span class="cat-nm">음식</span></button>
    <button class="cat-btn" onclick="startCat('animal')"  style="border-bottom:6px solid #6BCB77"><span class="cat-em">🐶</span><span class="cat-nm">동물</span></button>
    <button class="cat-btn" onclick="startCat('vehicle')" style="border-bottom:6px solid #4DA6FF"><span class="cat-em">🚗</span><span class="cat-nm">탈것</span></button>
    <button class="cat-btn" onclick="startCat('home')"    style="border-bottom:6px solid #FFD93D"><span class="cat-em">🏠</span><span class="cat-nm">집안</span></button>
    <button class="cat-btn" onclick="startCat('family')"  style="border-bottom:6px solid #C77DFF"><span class="cat-em">👨‍👩‍👧</span><span class="cat-nm">가족</span></button>
    <button class="cat-btn" onclick="startCat('custom')"  style="border-bottom:6px solid #FF9A3C"><span class="cat-em">⭐</span><span class="cat-nm">내 단어</span></button>
  </div>
  <div class="home-btns">
    <button class="icon-btn" onclick="show('addScreen')">➕</button>
    <button class="icon-btn" onclick="show('recordScreen')">🎤</button>
  </div>
</div>

<!-- WORD -->
<div id="wordScreen" class="screen">
  <div class="word-bg" id="wordBg"></div>
  <div class="deco" id="deco"></div>
  <div class="progress-bar" id="progressBar"></div>
  <button class="back-btn" onclick="show('homeScreen')">←</button>
  <div class="emoji-wrap">
    <span class="big-emoji" id="bigEmoji"></span>
  </div>
  <div class="touch-overlay" id="touchOverlay"></div>
  <div class="particles" id="particles"></div>
  <div class="praise-overlay" id="praiseOverlay" onclick="this.classList.remove('show')">
    <div class="praise-em" id="praiseEm"></div>
    <div class="praise-txt">잘했어요! 🎊</div>
  </div>
  <div class="swipe-hint">← 스와이프 →</div>
</div>

<!-- RECORD -->
<div id="recordScreen" class="screen">
  <div style="font-size:36px">🎤</div>
  <div class="rec-title">엄마·아빠 목소리 녹음</div>
  <div class="rec-list" id="recList"></div>
  <button class="back-home" onclick="show('homeScreen')">← 홈으로</button>
</div>

<!-- ADD -->
<div id="addScreen" class="screen">
  <div class="add-title">✏️ 새 단어 추가</div>
  <div class="add-form">
    <input class="add-input" id="newName"  placeholder="단어 이름 (예: 뭉치)" maxlength="10">
    <input class="add-input" id="newEmoji" placeholder="이모지 (예: 🐕)" maxlength="4">
    <div class="photo-preview" id="photoPreview" onclick="document.getElementById('photoInput').click()">
      📷<span style="font-size:13px;color:#aaa">사진 선택 (선택사항)</span>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelect(event)">
    <div class="rec-ind" id="addRecInd"><div class="recdot"></div> 녹음 중... (최대 5초)</div>
    <button class="big-btn" id="addRecBtn" onclick="toggleAddRec()">🎤 발음 녹음하기</button>
    <button class="big-btn green" onclick="saveWord()">💾 저장하기</button>
    <button class="back-home" style="text-align:center" onclick="show('homeScreen')">← 홈으로</button>
  </div>
</div>

<script>
const WORDS = {
  food:[
    {name:'사과',  emoji:'🍎', bg:['#FF6B6B','#FF8E53']},
    {name:'바나나', emoji:'🍌', bg:['#F7971E','#FFD200']},
    {name:'딸기',  emoji:'🍓', bg:['#FF416C','#FF4B2B']},
    {name:'포도',  emoji:'🍇', bg:['#9D50BB','#6E48AA']},
    {name:'우유',  emoji:'🥛', bg:['#74EBD5','#9FACE6']},
    {name:'계란',  emoji:'🥚', bg:['#F8FFAE','#43C6AC']},
    {name:'빵',   emoji:'🍞', bg:['#F2994A','#F2C94C']},
    {name:'오렌지',emoji:'🍊', bg:['#FF8008','#FFC837']},
  ],
  animal:[
    {name:'강아지', emoji:'🐶', bg:['#FDDB92','#D1FDFF']},
    {name:'고양이', emoji:'🐱', bg:['#FDC830','#F37335']},
    {name:'토끼',  emoji:'🐰', bg:['#FFB7C5','#FF85A1']},
    {name:'오리',  emoji:'🦆', bg:['#4CA1AF','#C4E0E5']},
    {name:'코끼리', emoji:'🐘', bg:['#B8C6DB','#F5F7FA']},
    {name:'사자',  emoji:'🦁', bg:['#F9A825','#F57F17']},
    {name:'곰',   emoji:'🐻', bg:['#A07040','#D4A060']},
    {name:'펭귄',  emoji:'🐧', bg:['#2C3E50','#4CA1AF']},
  ],
  vehicle:[
    {name:'자동차', emoji:'🚗', bg:['#FF416C','#FF4B2B']},
    {name:'버스',  emoji:'🚌', bg:['#F7971E','#FFD200']},
    {name:'기차',  emoji:'🚂', bg:['#3F2B96','#A8C0FF']},
    {name:'비행기', emoji:'✈️', bg:['#2980B9','#6DD5FA']},
    {name:'배',   emoji:'⛵', bg:['#1A2980','#26D0CE']},
    {name:'자전거', emoji:'🚲', bg:['#56AB2F','#A8E063']},
  ],
  home:[
    {name:'컵',   emoji:'🥤', bg:['#FF9A9E','#FAD0C4']},
    {name:'신발',  emoji:'👟', bg:['#A18CD1','#FBC2EB']},
    {name:'공',   emoji:'⚽', bg:['#43C6AC','#191654']},
    {name:'침대',  emoji:'🛏️', bg:['#4568DC','#B06AB3']},
    {name:'책',   emoji:'📚', bg:['#F953C6','#B91D73']},
    {name:'인형',  emoji:'🧸', bg:['#FFC3A0','#FFAFBD']},
    {name:'의자',  emoji:'🪑', bg:['#D3CCE3','#E9E4F0']},
  ],
  family:[
    {name:'엄마',   emoji:'👩', bg:['#FF9A9E','#FECFEF']},
    {name:'아빠',   emoji:'👨', bg:['#A1C4FD','#C2E9FB']},
    {name:'아기',   emoji:'👶', bg:['#FDE68A','#FCA5A5']},
    {name:'할머니',  emoji:'👵', bg:['#D4FC79','#96E6A1']},
    {name:'할아버지',emoji:'👴', bg:['#89F7FE','#66A6FF']},
  ],
};

let customWords=[];
try{customWords=JSON.parse(localStorage.getItem('bwCustom')||'[]');}catch(e){}

let curWords=[],curIdx=0,seqCount=0,lastTapTime=0;
let touchStartX=0,touchStartY=0;
let recMR=null,recActive=false,recTarget=null;
let addMR=null,addChunks=[],addRec=null,newPhoto=null;
let curAudio=null;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='recordScreen') buildRecList();
}

function startCat(cat){
  if(cat==='custom'){
    if(!customWords.length){alert('아직 추가한 단어가 없어요! ➕ 버튼으로 추가해보세요!');return;}
    curWords=customWords;
  } else { curWords=WORDS[cat]||[]; }
  curIdx=0; seqCount=0;
  show('wordScreen');
  loadWord(0,'none');
}

function loadWord(idx,dir){
  const w=curWords[idx]; if(!w) return;
  seqCount++;

  // 배경색
  const bg=w.bg||['#FF9A9E','#FAD0C4'];
  document.getElementById('wordBg').style.background=`linear-gradient(160deg,${bg[0]},${bg[1]})`;

  // 장식 원
  const dc=document.getElementById('deco'); dc.innerHTML='';
  for(let i=0;i<6;i++){
    const c=document.createElement('div'); c.className='deco-circle';
    const s=60+Math.random()*220;
    c.style.cssText=`width:${s}px;height:${s}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${0.08+Math.random()*0.12};`;
    dc.appendChild(c);
  }

  // 이모지
  const em=document.getElementById('bigEmoji');
  em.style.opacity='0';
  setTimeout(()=>{ em.textContent=w.emoji; em.style.opacity='1'; em.classList.remove('pop'); },50);

  // 슬라이드
  const ov=document.getElementById('touchOverlay');
  if(dir==='left'){ov.classList.remove('slide-right');void ov.offsetWidth;ov.classList.add('slide-left');}
  if(dir==='right'){ov.classList.remove('slide-left');void ov.offsetWidth;ov.classList.add('slide-right');}

  document.getElementById('progressBar').style.width=((idx+1)/curWords.length*100)+'%';
  setTimeout(()=>playWord(w),400);
  if(seqCount>0&&seqCount%3===0) setTimeout(showPraise,900);
}

function playWord(w){
  if(curAudio){try{curAudio.pause();}catch(e){}curAudio=null;}
  let rec; try{rec=localStorage.getItem(`bwRec_${w.name}`);}catch(e){}
  if(rec){ curAudio=new Audio(rec); curAudio.play().catch(()=>{}); }
  else if('speechSynthesis' in window){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(w.name);
    u.lang='ko-KR'; u.rate=0.7; u.pitch=1.3;
    speechSynthesis.speak(u);
  }
  const ws=document.createElement('div'); ws.className='sound-wave';
  document.getElementById('wordScreen').appendChild(ws);
  setTimeout(()=>ws.remove(),700);
}

const ov=document.getElementById('touchOverlay');
ov.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
ov.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){dx<0?nextWord():prevWord();}
  else if(Math.abs(dx)<15&&Math.abs(dy)<15) onTap(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
},{passive:true});
ov.addEventListener('mousedown',e=>{touchStartX=e.clientX;touchStartY=e.clientY;});
ov.addEventListener('mouseup',e=>{
  const dx=e.clientX-touchStartX,dy=e.clientY-touchStartY;
  if(Math.abs(dx)<15&&Math.abs(dy)<15) onTap(e.clientX,e.clientY);
});

function onTap(x,y){
  spawnParticles(x,y);
  const em=document.getElementById('bigEmoji');
  em.classList.remove('pop'); void em.offsetWidth; em.classList.add('pop');
  const now=Date.now();
  if(now-lastTapTime<380) nextWord();
  else playWord(curWords[curIdx]);
  lastTapTime=now;
}

function nextWord(){curIdx=(curIdx+1)%curWords.length;loadWord(curIdx,'left');}
function prevWord(){curIdx=(curIdx-1+curWords.length)%curWords.length;loadWord(curIdx,'right');}

const PEMS=['⭐','❤️','🌟','💛','🎉','✨','💖','🌈','🦋','🍀','🎈','🌸'];
function spawnParticles(x,y){
  const c=document.getElementById('particles');
  for(let i=0;i<8;i++){
    const p=document.createElement('div'); p.className='particle';
    p.textContent=PEMS[Math.floor(Math.random()*PEMS.length)];
    p.style.left=(x+(Math.random()-.5)*120)+'px';
    p.style.top=(y+(Math.random()-.5)*120)+'px';
    p.style.animationDelay=(Math.random()*.15)+'s';
    c.appendChild(p); setTimeout(()=>p.remove(),1100);
  }
}

const PRAISES=['🎉','🏆','⭐','🌟','🥳','🎊','💯','🎈','🌈','💫'];
function showPraise(){
  document.getElementById('praiseEm').textContent=PRAISES[Math.floor(Math.random()*PRAISES.length)];
  document.getElementById('praiseOverlay').classList.add('show');
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance('짝짝짝! 잘했어요!');
    u.lang='ko-KR'; u.rate=0.85; u.pitch=1.4; speechSynthesis.speak(u);
  }
  setTimeout(()=>document.getElementById('praiseOverlay').classList.remove('show'),2200);
}

function buildRecList(){
  const all=Object.values(WORDS).flat().concat(customWords);
  document.getElementById('recList').innerHTML=all.map(w=>{
    let has=false; try{has=!!localStorage.getItem(`bwRec_${w.name}`);}catch(e){}
    return `<div class="rec-item">
      <span class="ri-em">${w.emoji}</span>
      <div class="ri-info">
        <div class="ri-name">${w.name}</div>
        <div class="ri-status">${has?'✅ 녹음됨':'🎤 녹음 안됨'}</div>
      </div>
      <div class="ri-btns">
        ${has?`<button class="sm-btn btn-play" onclick="playRec('${w.name}')">▶️</button>
               <button class="sm-btn btn-redo" onclick="startRec('${w.name}',this)">🔄</button>`
             :`<button class="sm-btn btn-rec"  onclick="startRec('${w.name}',this)">🎤</button>`}
      </div>
    </div>`;
  }).join('');
}

function playRec(name){
  let d; try{d=localStorage.getItem(`bwRec_${name}`);}catch(e){}
  if(d){const a=new Audio(d);a.play().catch(()=>{});}
}

async function startRec(name,btn){
  if(recActive&&recTarget===name){recMR.stop();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const opts=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ?{mimeType:'audio/webm;codecs=opus',audioBitsPerSecond:16000}:{audioBitsPerSecond:16000};
    recMR=new MediaRecorder(stream,opts); const chunks=[];
    recMR.ondataavailable=e=>chunks.push(e.data);
    recMR.onstop=()=>{
      const fr=new FileReader();
      fr.onload=()=>{
        try{cleanStorage();localStorage.setItem(`bwRec_${name}`,fr.result);}
        catch(e){alert('저장 공간 부족! 일부 녹음을 삭제해주세요.');}
        buildRecList();
      };
      fr.readAsDataURL(new Blob(chunks));
      stream.getTracks().forEach(t=>t.stop());
      recActive=false; recTarget=null;
    };
    recMR.start(100); recActive=true; recTarget=name;
    btn.textContent='⏹️'; btn.style.background='#FF4444';
    setTimeout(()=>{if(recActive&&recTarget===name&&recMR.state==='recording')recMR.stop();},3000);
  }catch(e){alert('마이크 권한이 필요해요!');}
}

function cleanStorage(){
  try{
    let total=0,keys=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('bwRec_')){keys.push(k);total+=(localStorage.getItem(k)||'').length;}
    }
    if(total>1800000&&keys.length>2) keys.slice(0,Math.ceil(keys.length/2)).forEach(k=>localStorage.removeItem(k));
  }catch(e){}
}

function onPhotoSelect(e){
  const f=e.target.files[0]; if(!f) return;
  const fr=new FileReader();
  fr.onload=ev=>{
    newPhoto=ev.target.result;
    document.getElementById('photoPreview').innerHTML=`<img src="${newPhoto}">`;
  };
  fr.readAsDataURL(f);
}

async function toggleAddRec(){
  const btn=document.getElementById('addRecBtn');
  const ind=document.getElementById('addRecInd');
  if(addMR&&addMR.state==='recording'){addMR.stop();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const opts=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ?{mimeType:'audio/webm;codecs=opus',audioBitsPerSecond:16000}:{audioBitsPerSecond:16000};
    addMR=new MediaRecorder(stream,opts); addChunks=[];
    addMR.ondataavailable=e=>addChunks.push(e.data);
    addMR.onstop=()=>{
      const fr=new FileReader();
      fr.onload=()=>{addRec=fr.result;};
      fr.readAsDataURL(new Blob(addChunks));
      stream.getTracks().forEach(t=>t.stop());
      ind.classList.remove('on');
      btn.textContent='✅ 녹음 완료'; btn.className='big-btn green';
    };
    addMR.start(100); ind.classList.add('on');
    btn.textContent='⏹️ 중지'; btn.className='big-btn redbtn';
    setTimeout(()=>{if(addMR&&addMR.state==='recording')addMR.stop();},5000);
  }catch(e){alert('마이크 권한이 필요해요!');}
}

function saveWord(){
  const name=document.getElementById('newName').value.trim();
  const emoji=document.getElementById('newEmoji').value.trim()||'⭐';
  if(!name){alert('단어 이름을 입력해주세요!');return;}
  const colors=[['#FF9A9E','#FAD0C4'],['#A1C4FD','#C2E9FB'],['#D4FC79','#96E6A1'],
                ['#FDE68A','#FCA5A5'],['#A18CD1','#FBC2EB'],['#FDC830','#F37335']];
  const bg=colors[customWords.length%colors.length];
  customWords.push({name,emoji,bg,photoData:newPhoto});
  try{localStorage.setItem('bwCustom',JSON.stringify(customWords));}catch(e){}
  if(addRec){try{cleanStorage();localStorage.setItem(`bwRec_${name}`,addRec);}catch(e){}}
  document.getElementById('newName').value='';
  document.getElementById('newEmoji').value='';
  document.getElementById('photoPreview').innerHTML='📷<span style="font-size:13px;color:#aaa">사진 선택 (선택사항)</span>';
  document.getElementById('addRecBtn').textContent='🎤 발음 녹음하기';
  document.getElementById('addRecBtn').className='big-btn';
  document.getElementById('addRecInd').classList.remove('on');
  newPhoto=null; addRec=null; addChunks=[];
  alert(`"${name}" 단어가 추가됐어요! 🎉`);
  show('homeScreen');
}
</script>
